<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AdsAuditor — Settings</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- All copy below is populated at runtime via browser.i18n.getMessage (main.ts) —
         this markup only provides the DOM skeleton (ROADMAP §1.4). -->
    <div id="app">
      <header class="app-header">
        <h1 id="options-heading" class="options-heading"></h1>
      </header>

      <section class="card">
        <p id="options-intro" class="options-intro"></p>
      </section>

      <section class="card">
        <h2 id="calibration-title" class="card-title"></h2>
        <dl id="calibration-list" class="calibration-list">
          <div class="calibration-row">
            <dt id="calibration-adblock-label"></dt>
            <dd id="calibration-adblock-value"></dd>
          </div>
          <div class="calibration-row">
            <dt id="calibration-premium-label"></dt>
            <dd id="calibration-premium-value"></dd>
          </div>
          <div class="calibration-row">
            <dt id="calibration-last-positive-label"></dt>
            <dd id="calibration-last-positive-value"></dd>
          </div>
          <div class="calibration-row">
            <dt id="calibration-last-failure-label"></dt>
            <dd id="calibration-last-failure-value"></dd>
          </div>
        </dl>
      </section>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
