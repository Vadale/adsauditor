<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AdsAuditor</title>
    <meta name="manifest.type" content="browser_action" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- All copy below is populated at runtime via browser.i18n.getMessage (main.ts) —
         this markup only provides the DOM skeleton (ROADMAP §1.4). -->
    <div id="app">
      <header class="app-header">
        <span class="app-name">AdsAuditor</span>
      </header>

      <section id="state-section" class="section">
        <span id="state-chip" class="state-chip" hidden></span>
        <p id="state-headline" class="headline"></p>
        <p id="state-detail" class="detail" hidden></p>
        <p id="state-disclaimer" class="disclaimer" hidden></p>
        <p id="state-ssai" class="ssai-note" hidden></p>
        <p id="state-ad-decision-note" class="ad-decision-note" hidden></p>
        <div id="no-signal-cause" class="no-signal-cause" hidden>
          <p id="no-signal-cause-text"></p>
          <p id="last-valid-observation" class="last-valid-observation" hidden></p>
          <button id="open-settings-button" type="button" class="link-button"></button>
        </div>
      </section>

      <section id="evidence-section" class="section" hidden>
        <h2 id="evidence-title" class="section-title"></h2>
        <ul id="evidence-list" class="evidence-list"></ul>
        <p id="confidence-line" class="confidence-line"></p>
      </section>

      <section class="section">
        <h2 id="history-title" class="section-title"></h2>
        <div class="history-toolbar">
          <input id="history-search" type="text" class="history-search" />
          <button id="export-json-button" type="button" class="export-button"></button>
        </div>
        <ul id="history-list" class="history-list"></ul>
        <p id="history-empty" class="history-empty" hidden></p>
      </section>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
