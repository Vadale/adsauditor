name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: extension

jobs:
  extension:
    name: Lint, test, build (extension)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build + zip (Chrome and Firefox)
        run: npm run zip

      - name: Upload extension zips
        uses: actions/upload-artifact@v4
        with:
          name: adsauditor-extension-${{ github.sha }}
          path: |
            extension/.output/*-chrome.zip
            extension/.output/*-firefox.zip
            extension/.output/*-sources.zip
          if-no-files-found: error
